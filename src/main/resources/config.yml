# ==============================================
# BestSupplies - Configuracion General
# ==============================================

timezone: "America/Lima"

database:
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    database: bestsupplies
    username: root
    password: ""
    pool-size: 10

# Legacy semanal (solo para funciones administrativas antiguas)
weekly-reset:
  day: MONDAY
  hour: 0
  minute: 0

gui-update-interval: 20
use-cheque-item: false

enable-placeholderapi: true
enable-itemsadder-icons: true

debug: false

gui-titles:
  hub: "<gold><bold>Supplies</bold></gold>"
  daily: "<gold><bold>Recompensas Diarias</bold></gold>"
  bank: "<gold><bold>Banca Mensual</bold></gold>"
  food: "<gold><bold>Raciones</bold></gold>"
  pending: "<gold><bold>Pendientes</bold></gold>"

itemsadder-icons:
  daily-menu: "nullith:diamond"
  monthly-bank-menu: "nullith:money_token"
  nav-back: "_iainternal:icon_back_orange"
  nav-next: "_iainternal:icon_next_orange"
  nav-cancel: "_iainternal:icon_cancel"
  lock: "mcicons:icon_lock"

decoration:
  filler: WHITE_STAINED_GLASS_PANE
  border: GRAY_STAINED_GLASS_PANE
