# ==============================================
# BestSupplies - Mensajes
# ==============================================

prefix: "<gold>[Supplies]</gold> "

general:
  no-permission: "<red>No tienes permiso para hacer eso.</red>"
  player-only: "<red>Este comando solo puede usarse en juego.</red>"
  player-not-found: "<red>Jugador no encontrado: %player%</red>"
  reload-success: "<green>Configuracion recargada correctamente.</green>"
  invalid-command: "<red>Comando invalido. Usa /supplies.</red>"

daily:
  claim-success: "<green>Has reclamado tu recompensa diaria.</green>"
  claim-money: "<gold>+€%amount%</gold>"
  already-claimed: "<yellow>Ya reclamaste la recompensa de hoy.</yellow>"
  streak-bonus: "<gold>Bonus de racha aplicado (+%bonus%%).</gold>"
  streak-milestone: "<gold>Hito de racha alcanzado.</gold>"
  streak-lost: "<red>Tu racha se reinicio por inactividad.</red>"

bank:
  monthly-claim-success: "<green>Reclamaste la banca mensual del dia %day% (+€%amount%).</green>"
  claim-success: "<green>Has reclamado tu cheque semanal.</green>"
  cheque-received: "<gold>Recibiste un cheque por €%amount%.</gold>"
  direct-deposit: "<gold>Se depositaron €%amount% en tu cuenta.</gold>"

cheque:
  item-name: "<gold>Cheque Semanal</gold>"
  lore:
    - "<gray>Monto: <gold>€%amount%</gold></gray>"
    - "<gray>Tag: %bestsupplies_rank_tag%</gray>"
    - "<gray>Periodo: %week%</gray>"
    - ""
    - "<yellow>Clic derecho para canjear</yellow>"
  redeemed: "<green>Cheque canjeado. +€%amount%</green>"
  invalid: "<red>Este cheque es invalido o ya no existe.</red>"
  not-owner: "<red>Este cheque no te pertenece.</red>"
  already-redeemed: "<red>Este cheque ya fue canjeado.</red>"

food:
  claim-success: "<green>Has reclamado %pack%.</green>"

pending:
  empty: "<gray>No tienes entregas pendientes.</gray>"
  items-pending: "<yellow>Tienes %count% entregas pendientes. Usa /supplies pending.</yellow>"
  withdraw-success: "<green>Entrega retirada correctamente.</green>"
  withdraw-all-success: "<green>Se retiraron todas las entregas posibles.</green>"
  inventory-full: "<red>Inventario lleno. Libera espacio primero.</red>"
  saved-to-pending: "<yellow>Inventario lleno. Guardamos la entrega en pendientes.</yellow>"

placeholders:
  daily-claimed: "reclamadas"
  daily-pending: "pendiente"
  bank-claimed: "reclamadas"
  bank-pending: "pendiente"
  food-claimed: "reclamadas"
  food-pending: "pendiente"

gui:
  hub:
    daily-item: "<gold>Recompensas Diarias</gold>"
    daily-lore:
      - "<gray>Consulta y reclama tu recompensa de hoy.</gray>"
    bank-item: "<gold>Banca Mensual</gold>"
    bank-lore:
      - "<gray>Reclama cada dia del mes segun tu rango.</gray>"
    food-item: "<gold>Raciones</gold>"
    food-lore:
      - "<gray>Abre raciones con cooldown y bloqueos por rango.</gray>"
    pending-item: "<gold>Pendientes</gold>"
    pending-lore:
      - "<gray>Tienes <yellow>%count%</yellow> entregas pendientes.</gray>"
      - "<gray>Retira tus items guardados por inventario lleno.</gray>"

  daily:
    today-available: "<green>%day% (%date%) - Disponible</green>"
    today-claimed: "<gold>%day% (%date%) - Reclamada</gold>"
    past-claimed: "<gray>%day% (%date%) - Reclamada</gray>"
    past-missed: "<dark_gray>%day% (%date%) - Expirada</dark_gray>"
    future-locked: "<yellow>%day% (%date%) - Bloqueada</yellow>"
    back-item: "<gold>Volver al menu principal</gold>"
    back-lore:
      - "<gray>Regresar a Supplies.</gray>"

  bank:
    day-locked: "<yellow>Dia %day% de %month%</yellow>"
    day-locked-lore:
      - "<gray>Esta recompensa aun no se desbloquea.</gray>"
    day-claimed: "<gray>Dia %day% de %month% - Reclamado</gray>"
