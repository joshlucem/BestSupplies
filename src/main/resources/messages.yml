    info-lore:
      - "<gray>Tag de rango: %bestsupplies_rank_tag%</gray>"
      - "<gray>Pagina: %page%/%total%</gray>"
      - "<gray>Dias del mes: %days%</gray>"
      - ""
      - "<yellow>Reclama rapido las recompensas del mes.</yellow>"
      - "<yellow>Al iniciar otro mes, las del mes anterior se pierden.</yellow>"
    back-item: "<gold>Volver al menu principal</gold>"
    back-lore:
      - "<gray>Regresar a Supplies.</gray>"

  food:
    ration-ready: "<green>%ration%</green>"
    ration-cooldown: "<yellow>%ration%</yellow>"
    ration-claimed: "<gray>%ration%</gray>"
    ration-locked: "<red>%ration%</red>"
    info-item: "<gold>Info de Raciones</gold>"
    info-lore:
      - "<gray>Tag de rango: %bestsupplies_rank_tag%</gray>"
      - "<gray>Pagina: %page%/%total%</gray>"
      - ""
      - "<gray>Las raciones premium se desbloquean por rango de pago.</gray>"
    back-item: "<gold>Volver al menu principal</gold>"
    back-lore:
      - "<gray>Regresar a Supplies.</gray>"

  pending:
    item-entry: "<gold>Entrega pendiente #%id%</gold>"
    withdraw-lore:
      - "<gray>Clic para retirar esta entrega.</gray>"
    info-item: "<gold>Info de Pendientes</gold>"
    info-lore:
      - "<gray>Tag de rango: %bestsupplies_rank_tag%</gray>"
      - "<gray>Pagina: %page%/%total%</gray>"
      - "<gray>Total pendientes: %count%</gray>"
    back-item: "<gold>Volver al menu principal</gold>"
    back-lore:
      - "<gray>Regresar a Supplies.</gray>"

  common:
    prev-page-item: "<gold>Pagina anterior</gold>"
    prev-page-lore:
      - "<gray>Volver a la pagina anterior.</gray>"
    no-prev-item: "<gray>No hay pagina anterior</gray>"
    no-prev-lore:
      - "<gray>No hay mas paginas para retroceder.</gray>"
    next-page-item: "<gold>Pagina siguiente</gold>"
    next-page-lore:
      - "<gray>Avanzar a la siguiente pagina.</gray>"
    no-next-item: "<gray>No hay pagina siguiente</gray>"
    no-next-lore:
      - "<gray>No hay mas paginas para avanzar.</gray>"

  back-item: "<gray>Volver</gray>"
  close-item: "<red>Cerrar</red>"

admin:
  reset-daily: "<green>Diaria reiniciada para %player%.</green>"
  reset-bank: "<green>Banca mensual reiniciada para %player% en dia %day%.</green>"
  reset-food: "<green>Cooldowns de raciones reiniciados para %player%.</green>"
  give-cheque: "<green>Cheque legacy de €%amount% entregado a %player%.</green>"
  debug-header: "<gold>=== Debug de %player% ===</gold>"
  debug-streak: "<gray>Racha: %streak%</gray>"
  debug-last-daily: "<gray>Ultima diaria: %date%</gray>"
  debug-rank-id: "<gray>Rank ID interno: %rank_id%</gray>"
  debug-tag: "<gray>Tag: %tag%</gray>"
